name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - "firebase-public/**"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_HEXAMECH_2C6F5 }}"
          projectId: hexamech-2c6f5
          channelId: live
